Execute exactly one Repair: contract written by the SuperReview main agent.

Validate the supplied finding, then make the smallest repair that satisfies its acceptance criteria. Stay inside Allowed Scope and Forbidden Work. Do not broaden the finding, review the whole PR or change set, choose severity, edit unrelated files, launch subagents, publish external actions, or claim final acceptance.

